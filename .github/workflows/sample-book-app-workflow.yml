name: Sample Book App Workflow


on:
  push:
    branches: ["main"]
    # paths-ignore: 
    #   - 'README.md'
    #   - 'Jenkinsfile'
  workflow_dispatch:

jobs:
  build-install-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Print step name
        run: echo "Installing all necessary node dependecies"
  deploy-dev:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Print step name
        run: echo "Deployment to DEV environment has started.."
  test-dev:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Print step name
        run: echo "Testing Sample Book Application service has started on DEV environment.."
  deploy-stg:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Print step name
        run: echo "Deployment to DEV environment has started.."
  test-stg:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Print step name
        run: echo "Testing Sample Book Application service has started on DEV environment.."
  deploy-prd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Print step name
        run: echo "Deployment to DEV environment has started.."
  test-prd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Print step name
        run: echo "Testing Sample Book Application service has started on DEV environment.."

